<!DOCTYPE html>
<html>
<head>
<title>Register</title>

<style>
body {
  margin:0;
  font-family: Arial;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(135deg,#ff0000 50%, #ffffff 50%);
}

.card {
  background:white;
  padding:30px;
  border-radius:20px;
  width:340px;
  text-align:center;
  box-shadow:0 20px 40px rgba(0,0,0,0.2);
}

.logo {
  width:70px;
  margin-bottom:10px;
}

.brand {
  font-weight:bold;
  font-size:22px;
}

.brand span {
  color:red;
}

input {
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:1px solid #ddd;
  box-sizing:border-box;
}

button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#ff0000;
  color:white;
  cursor:pointer;
}

.otp-row {
  display:flex;
  gap:10px;
  align-items:center;
}

.otp-row input {
  flex:1;
  padding:12px;
  border-radius:10px;
  border:1px solid #ddd;
  box-sizing:border-box;
}

.otp-row button {
  width:120px;
  margin-top:0;
}
</style>
</head>

<body>

<div class="card">

<img src="logo.jpeg" class="logo">
<div class="brand">FIRM<span>FLUID</span></div>

<h2>Create Account</h2>

<form id="form">

<!-- INPUTS -->
<input id="name" placeholder="Full Name" required>
<input id="email" placeholder="Email" required>
<input id="phone" placeholder="Phone Number" required>

<!-- OTP SECTION (FIXED & VISIBLE) -->
<div class="otp-row">
  <input id="otp" placeholder="Enter OTP">
  <button type="button" onclick="sendOTP()">Send OTP</button>
</div>

<!-- REGISTER -->
<button type="submit">Register</button>

</form>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey:"AIzaSy...", 
  projectId:"firmfluid-login-system"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let generatedOTP = null;

// SEND OTP
window.sendOTP = function(){
  generatedOTP = Math.floor(1000 + Math.random()*9000);
  alert("OTP sent successfully 📩");
  console.log("OTP:", generatedOTP);
}

// FORM SUBMIT
document.getElementById("form").addEventListener("submit", async function(e){
  e.preventDefault();

  let name = document.getElementById("name").value;
  let email = document.getElementById("email").value;
  let phone = document.getElementById("phone").value;
  let otp = document.getElementById("otp").value;

  // OTP CHECK
  if(!generatedOTP){
    alert("Please send OTP first");
    return;
  }

  if(otp != generatedOTP){
    alert("Invalid OTP ❌");
    return;
  }

  // SAVE LEAD (FIREBASE)
  await addDoc(collection(db,"leads"),{
    name,
    email,
    phone,
    time: serverTimestamp()
  });

  // BACKEND EMAIL
  await fetch("https://form-backend-bcjj.onrender.com/submit",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({name,email,phone})
  });

  // SUCCESS SCREEN
  document.body.innerHTML = "<h2 style='text-align:center;margin-top:50px;'>Registration Successful 🎉</h2>";

  setTimeout(()=>{
    window.location.href="https://firmfluid.com";
  },1500);

});

</script>

</body>
</html>
