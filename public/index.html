<!DOCTYPE html>
<html>
<head>
<title>Register</title>

<style>
body {
  margin:0;
  font-family: Arial;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(135deg,#ff0000 50%, #ffffff 50%);
}

.card {
  background:white;
  padding:30px;
  border-radius:20px;
  width:340px;
  text-align:center;
  box-shadow:0 20px 40px rgba(0,0,0,0.2);
}

.logo {
  width:70px;
  margin-bottom:10px;
}

.brand {
  font-weight:bold;
  font-size:22px;
}

.brand span {
  color:red;
}

input {
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:1px solid #ddd;
  box-sizing:border-box;
}

button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#ff0000;
  color:white;
  cursor:pointer;
}

.otp-row {
  display:flex;
  gap:10px;
  align-items:center;
}

.otp-row input {
  flex:1;
}

.otp-row button {
  width:120px;
  margin-top:0;
}
</style>
</head>

<body>

<div class="card">

<img src="logo.jpeg" class="logo">
<div class="brand">FIRM<span>FLUID</span></div>

<h2>Create Account</h2>

<form id="form">

<input id="name" placeholder="Full Name" required>
<input id="email" placeholder="Email" required>
<input id="phone" placeholder="Phone Number" required>

<div class="otp-row">
  <input id="otp" placeholder="Enter OTP">
  <button type="button" onclick="sendOTP()">Send OTP</button>
</div>

<button type="submit">Register</button>

</form>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey:"AIzaSy...", 
  projectId:"firmfluid-login-system"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔥 SEND OTP FROM BACKEND
window.sendOTP = async function(){

  let email = document.getElementById("email").value;

  if(!email){
    alert("Enter email first");
    return;
  }

  try {
    const res = await fetch("https://form-backend-new.onrender.com/submit",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ email })
    });

    const data = await res.json();

    if(data.success){
      alert("OTP sent to your email 📩");
    } else {
      alert("Failed to send OTP ❌");
    }

  } catch(err){
    alert("Server error ❌");
    console.log(err);
  }
};

// FORM SUBMIT
document.getElementById("form").addEventListener("submit", async function(e){
  e.preventDefault();

  let name = document.getElementById("name").value;
  let email = document.getElementById("email").value;
  let phone = document.getElementById("phone").value;

  const btn = document.querySelector("button[type='submit']");
  btn.innerText = "Processing...";
  btn.disabled = true;

  try {

    // SAVE FIREBASE
    await addDoc(collection(db,"leads"),{
      name,
      email,
      phone,
      time: serverTimestamp()
    });

    // SUCCESS PAGE
    document.body.innerHTML = `
      <div style="display:flex;flex-direction:column;justify-content:center;align-items:center;height:100vh;font-family:Arial;text-align:center;">
        <h1 style="color:green;">Registration Successful 🎉</h1>
        <p>Redirecting to home...</p>

        <a href="https://firmfluid.com">
          <button style="padding:12px 20px;background:red;color:white;border:none;border-radius:8px;margin-top:20px;">
            Go to Home
          </button>
        </a>
      </div>
    `;

    setTimeout(()=>{
      window.location.href="https://firmfluid.com";
    },3000);

  } catch(err){
    alert("Something went wrong ❌");
    console.error(err);
    btn.innerText = "Register";
    btn.disabled = false;
  }

});

</script>

</body>
</html>
